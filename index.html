<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国城市地图 - 交互式可视化</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/topojson-client@3"></script>
<link rel="stylesheet" href="style.css">
<script src="china_data.js"></script>
</head>
<body>
<div id="map"></div>
<div id="sidebar">
  <div id="sidebar-header">
    <div>
      <h1>中国城市地图</h1>
      <p id="header-subtitle">共 375 个城市 · 点击或搜索</p>
    </div>
    <button class="btn btn-start" id="btn-game" onclick="toggleGame()">开始游戏</button>
  </div>
  <div id="search-box">
    <input type="text" id="search-input" placeholder="搜索城市名称…" autocomplete="off">
  </div>
  <div id="search-results"></div>
  <div id="game-box">
    <input type="text" id="game-input" placeholder="输入城市名称…" autocomplete="off">
  </div>
  <div id="detail-panel"></div>
  <div id="game-city-list"></div>
  <div id="game-stats">
    <span>已点亮: <strong id="game-score">0</strong> / 375</span>
    <span id="game-last-city"></span>
  </div>
  </div>
<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>
